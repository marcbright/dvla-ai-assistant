# Sample nginx reverse proxy for DVLA Assist (Streamlit on 8501).
# Copy to e.g. /etc/nginx/sites-available/dvla-assist and adjust server_name and SSL paths.
# Obtain certificates with certbot (Let's Encrypt) before enabling this site.

# Redirect HTTP to HTTPS
server {
    listen 80;
    listen [::]:80;
    server_name dvla-assist.example.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name dvla-assist.example.com;

    ssl_certificate     /etc/letsencrypt/live/dvla-assist.example.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/dvla-assist.example.com/privkey.pem;
    ssl_session_timeout 1d;
    ssl_session_cache shared:SSL:10m;
    ssl_protocols TLSv1.2 TLSv1.3;

    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # Adjust CSP if you add external scripts or CDNs.
    add_header Content-Security-Policy "default-src 'self'; frame-ancestors 'self'; img-src 'self' data: https:; font-src 'self' https://fonts.gstatic.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; script-src 'self' 'unsafe-inline'; connect-src 'self' https: wss:;" always;

    location / {
        proxy_pass http://127.0.0.1:8501;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 86400;
    }
}
